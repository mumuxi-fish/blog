<h1>DanKoeTalks：如果你想让人生发生改变，就必须走向极端</h1>

<p>Dan Koe——独立创作者、作家，在社交媒体上以"把人生哲学变成生意"著称。他讲的东西通常围绕：创造者经济、个人品牌、写作、以及如何在现代社会中活出有意义的人生。</p>

<p>这期视频的核心命题很直接：为什么温和的改变永远不够？为什么真正的人生转折点，都伴随着某种形式的"极端"决定？</p>

<p>Dan Koe 的典型风格——听起来像鸡汤，但拆开看有很硬的结构和逻辑。适合在做某个重大决定前看一遍，给自己一点推一把的力量。</p>
